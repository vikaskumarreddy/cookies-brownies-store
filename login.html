<!DOCTYPE html>
<html>
<head>
  <title>Account | Sweet Cravings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9f8;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .auth-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .auth-card button {
      width: 100%;
      padding: 12px;
      background: #2f7d57;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .auth-toggle {
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      color: #2f7d57;
    }

    .account-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .orders-scroll {
      max-height: 300px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .order-card {
      background: #fff;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .view-items-btn {
      background: #2f7d57;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .items-table {
      margin-top: 10px;
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .items-table th,
    .items-table td {
      border-bottom: 1px solid #eee;
      padding: 6px;
      text-align: left;
    }

    .logout-btn {
      width: 100%;
      margin-top: 20px;
      background: #d9534f;
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="logo">Sweet Cravings 🍪</div>
  <nav class="nav-links">
    <a href="products.html">Shop</a>
    <a href="categories.html">Categories</a>
    <a href="cart.html">🛒</a>
    <a href="login.html">Account</a>
  </nav>
</header>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- LOGIN FORM -->
    <div id="auth-form">
      <h2 id="form-title">Login</h2>

      <input type="email" id="email" placeholder="Email Address">
      <input type="password" id="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <div class="auth-toggle" onclick="toggleMode()">
        Don't have an account? Register
      </div>
    </div>

    <!-- ACCOUNT SECTION -->
    <div id="account-section" style="display:none;">

      <div class="account-header">
        <h2>Welcome, <span id="user-name"></span> 👋</h2>
      </div>

      <h3>My Orders</h3>
      <div id="orders-list" class="orders-scroll"></div>

      <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRzQ1qiq__Zp2IWa40IyV2kLi-5TwXjTQ",
  authDomain: "cookie-store-8d48b.firebaseapp.com",
  projectId: "cookie-store-8d48b",
  storageBucket: "cookie-store-8d48b.appspot.com",
  messagingSenderId: "234022229604",
  appId: "1:234022229604:web:f58d2d99ae17fbc0da3171"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isLogin = true;

window.toggleMode = function() {
  isLogin = !isLogin;
  document.getElementById("form-title").innerText =
    isLogin ? "Login" : "Register";
  document.querySelector(".auth-toggle").innerText =
    isLogin
      ? "Don't have an account? Register"
      : "Already have an account? Login";
};

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  if (isLogin) {
    signInWithEmailAndPassword(auth, email, password)
      .catch(err => alert(err.message));
  } else {
    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Account created successfully!"))
      .catch(err => alert(err.message));
  }
};

window.logout = function() {
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {

  if (user) {

    document.getElementById("auth-form").style.display = "none";
    document.getElementById("account-section").style.display = "block";

    const name = user.email.split("@")[0];
    document.getElementById("user-name").innerText = name;

    loadOrders(user.uid);

  } else {

    document.getElementById("auth-form").style.display = "block";
    document.getElementById("account-section").style.display = "none";

  }

});

async function loadOrders(uid) {

  const ordersContainer = document.getElementById("orders-list");
  ordersContainer.innerHTML = "Loading orders...";

  try {

    const q = query(
      collection(db, "orders"),
      where("userId", "==", uid),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      ordersContainer.innerHTML = "<p>No orders yet.</p>";
      return;
    }

    ordersContainer.innerHTML = "";

    snapshot.forEach(doc => {

      const data = doc.data();

      const date = data.createdAt
        ? new Date(data.createdAt.seconds * 1000).toLocaleString()
        : "N/A";

      let itemsHTML = `
        <table class="items-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Qty</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody>
      `;

      data.items.forEach(item => {
        itemsHTML += `
          <tr>
            <td>${item.name}</td>
            <td>${item.quantity}</td>
            <td>₹${item.price * item.quantity}</td>
          </tr>
        `;
      });

      itemsHTML += `
          </tbody>
        </table>
      `;

      const orderId = "items-" + doc.id;

      ordersContainer.innerHTML += `
        <div class="order-card">
          <div class="order-header">
            <div>
              <strong>Order ID:</strong> ${doc.id}<br>
              <small>${date}</small><br>
              <strong>Total:</strong> ₹${data.total}
            </div>
            <button class="view-items-btn" onclick="toggleItems('${orderId}')">
              View Items
            </button>
          </div>
          <div id="${orderId}" style="display:none;">
            ${itemsHTML}
          </div>
        </div>
      `;
    });

  } catch (error) {
    console.error("Error loading orders:", error);
    ordersContainer.innerHTML = "<p>Error loading orders.</p>";
  }
}

window.toggleItems = function(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
};

</script>

</body>
</html>
