<!DOCTYPE html>
<html>
<head>
  <title>Login | Sweet Cravings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/styles.css">

  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9f8;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .auth-card h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #2f7d57;
    }

    .auth-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .auth-card button {
      width: 100%;
      padding: 12px;
      background: #2f7d57;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .auth-toggle {
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      color: #2f7d57;
      margin-top: 10px;
    }

    .logout-section {
      text-align: center;
    }

    .logout-section button {
      background: #d9534f;
    }
    .order-card {
  background: #fff;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}
  </style>
</head>

<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div id="auth-form">
      <h2 id="form-title">Login</h2>

      <input type="email" id="email" placeholder="Email Address">
      <input type="password" id="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <div class="auth-toggle" onclick="toggleMode()">
        Don't have an account? Register
      </div>
    </div>

    <div id="logout-section" class="logout-section" style="display:none;">
      <h2>Welcome Back 🎉</h2>
      <p id="user-email"></p>
      <button onclick="logout()">Logout</button>
    </div>
    <div id="orders-section" style="display:none;">
  <h2>My Orders</h2>
  <div id="orders-list"></div>
</div>

  </div>
</div>

<!-- Firebase SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRzQ1qiq__Zp2IWa40IyV2kLi-5TwXjTQ",
  authDomain: "cookie-store-8d48b.firebaseapp.com",
  projectId: "cookie-store-8d48b",
  storageBucket: "cookie-store-8d48b.appspot.com",
  messagingSenderId: "234022229604",
  appId: "1:234022229604:web:f58d2d99ae17fbc0da3171"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isLogin = true;

window.toggleMode = function() {
  isLogin = !isLogin;

  document.getElementById("form-title").innerText =
    isLogin ? "Login" : "Register";

  document.querySelector(".auth-toggle").innerText =
    isLogin
      ? "Don't have an account? Register"
      : "Already have an account? Login";
};

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  if (isLogin) {
    signInWithEmailAndPassword(auth, email, password)
      .then(() => window.location.href = "index.html")
      .catch(err => alert(err.message));
  } else {
    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Account created successfully!"))
      .catch(err => alert(err.message));
  }
};

window.logout = function() {
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  if (user) {

    document.getElementById("auth-form").style.display = "none";
    document.getElementById("logout-section").style.display = "block";
    document.getElementById("orders-section").style.display = "block";

    document.getElementById("user-email").innerText = user.email;

    loadOrders(user.uid);

  } else {

    document.getElementById("auth-form").style.display = "block";
    document.getElementById("logout-section").style.display = "none";
    document.getElementById("orders-section").style.display = "none";

  }
});

async function loadOrders(uid) {

  const ordersContainer = document.getElementById("orders-list");
  ordersContainer.innerHTML = "Loading orders...";

  try {

    const q = query(
      collection(db, "orders"),
      where("userId", "==", uid),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      ordersContainer.innerHTML = "<p>No orders yet.</p>";
      return;
    }

    ordersContainer.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const date = data.createdAt
        ? new Date(data.createdAt.seconds * 1000).toLocaleString()
        : "N/A";

      ordersContainer.innerHTML += `
        <div class="order-card">
          <h4>Order ID: ${doc.id}</h4>
          <p>Status: ${data.status}</p>
          <p>Total: ₹${data.total}</p>
          <p>Date: ${date}</p>
        </div>
      `;
    });

  } catch (error) {
    console.error("Error loading orders:", error);
    ordersContainer.innerHTML = "<p>Error loading orders.</p>";
  }
}

</script>
</body>
</html>
