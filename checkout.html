<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Sweet Cravings 🍪</div>
  <nav class="nav-links">
    <a href="products.html">Shop</a>
    <a href="categories.html">Categories</a>
<a href="cart.html">
  🛒<span id="cart-count">0</span>
</a>    <a href="login.html">Login</a>
  </nav>
</header>

<div class="checkout-wrapper">

  <!-- LEFT SIDE -->
  <div class="checkout-left">

    <h2 class="section-title">Delivery Details</h2>

    <div class="card address-card">
      <div class="form-row">
        <input type="text" id="name" placeholder="Full Name *">
        <input type="text" id="phone" placeholder="Phone Number *">
      </div>

      <textarea id="address" placeholder="House No, Street, Area *"></textarea>

      <div class="form-row">
        <input type="text" id="city" placeholder="City *">
        <input type="text" id="pincode" placeholder="Pincode *">
      </div>

      <div class="form-row">
        <select id="state">
          <option value="">Select State</option>
          <option>Tamil Nadu</option>
          <option>Karnataka</option>
          <option>Kerala</option>
          <option>Telangana</option>
        </select>
        <select id="address-type">
          <option>Home</option>
          <option>Work</option>
        </select>
      </div>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="checkout-right">

    <div class="card summary-card">
      <h3>Order Summary</h3>

      <div id="checkout-items" class="summary-items"></div>

      <div class="price-row">
        <span>Subtotal</span>
        <span id="subtotal"></span>
      </div>

      <div class="price-row">
        <span>Delivery</span>
        <span>₹40</span>
      </div>

      <div class="price-row total-row">
        <span>Total</span>
        <span id="checkout-total"></span>
      </div>

      <button class="pay-btn" onclick="startPayment()">
        Proceed to Payment
      </button>

    </div>

  </div>

</div>
<div class="bottom-nav">
  <a href="index.html">🏠<span>Home</span></a>
  <a href="products.html">🛍<span>Shop</span></a>
  <a href="categories.html">📂<span>Categories</span></a>
  <a href="cart.html"><span id="cart-count-mobile">0</span>🛒</a>
  <a href="login.html">👤<span>Account</span></a>
</div>
<script src="js/products.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/checkout.js"></script>

</body>
</html>
