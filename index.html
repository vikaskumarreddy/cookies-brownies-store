<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sweet Cravings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
  <div class="logo">Sweet Cravings 🍪</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-overlay">
    <h1>Freshly Baked. 100% Natural.</h1>
    <div class="hero-buttons">
      <a href="products.html" class="btn-primary">Shop Now</a>
    </div>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <div class="section-header">
    <h2>Shop By Categories</h2>
    <a href="categories.html">View All</a>
  </div>

  <div class="category-grid">
    <a href="categories.html?category=brownies" class="category-card">
      <img src="images/brownie1.jpg">
      <p>Brownies →</p>
    </a>

    <a href="categories.html?category=cookies" class="category-card">
      <img src="images/cookie1.jpg">
      <p>Cookies →</p>
    </a>

    <a href="categories.html?category=premium" class="category-card">
      <img src="images/brownie2.jpg">
      <p>Premium →</p>
    </a>

    <a href="categories.html?category=gifts" class="category-card">
      <img src="images/cookie2.jpg">
      <p>Gift Boxes →</p>
    </a>
  </div>
</section>

<!-- FEATURED PRODUCTS -->
<section class="featured">
  <div class="section-header">
    <h2>Featured Products</h2>
    <a href="products.html">View All</a>
  </div>

  <div class="product-grid" id="featured-products"></div>
</section>

<!-- MOBILE NAV -->
<div class="bottom-nav">
  <a href="index.html">🏠<span>Home</span></a>
  <a href="products.html">🛍<span>Shop</span></a>
  <a href="categories.html">📂<span>Categories</span></a>
  <a href="cart.html">🛒<span>Cart</span></a>
  <a href="login.html">👤<span>Account</span></a>
</div>

<script src="js/products.js"></script>
<script>
  loadFeaturedProducts();

  function toggleMenu() {
    document.querySelector(".nav-links").classList.toggle("active");
  }
  function autoScroll(containerSelector) {
  const container = document.querySelector(containerSelector);
  if (!container) return;

  let scrollAmount = 0;
  const scrollStep = container.clientWidth;

  setInterval(() => {
    if (window.innerWidth <= 768) {
      scrollAmount += scrollStep;

      if (scrollAmount >= container.scrollWidth) {
        scrollAmount = 0;
      }

      container.scrollTo({
        left: scrollAmount,
        behavior: "smooth"
      });
    }
  }, 3000);
}

autoScroll(".category-grid");
autoScroll(".product-grid");
</script>

</body>
</html>
